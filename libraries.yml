msg:
  help: Handles Messages
  files:
    - source: "src/msg.sh"
      target: "%{user_lib_dir}/msg.%{user_ext}"
    - source: "src/msg_not_empty.sh"
      target: "%{user_lib_dir}/msg_not_empty.%{user_ext}"

argparse:
  help: Handles argument parsing
  files:
    - source: "src/argparser.sh" 
      target: "{user_lib_dir}/argparse.%{user_ext}"

print_help:
  help: Prints the help output
  files:
    - source: "src/print_help.sh"
      target: "{user_lib_dir}/print_help.%{user_ext}"

create_code_base:
  help: Creates base for settup for code projects
  files:
    - source: "src/create_gitignore.sh"
      target: "%{user_lib_dir}/create_gitignore.%{user_ext}"
    - source: "src/create_git.sh"
      target: "%{user_lib_dir}/create_git.%{user_ext}"
    - source: "src/create_license.sh"
      target: "%{user_lib_dir}/create_license.%{user_ext}"
    - source: "src/create_python_layout.sh"
      target: "%{user_lib_dir}/create_python_layout.%{user_ext}"
    - source: "src/create_readme.sh"
      target: "%{user_lib_dir}/create_readme%{user_ext}"


